function checkDeliveryTrigger(data) {
  const seq = (data.control || {}).active_control_seq;
  const artifacts = data.artifacts || {};
  const latestWorkPath = String((artifacts.latest_work || {}).path || '').trim();
  const latestWorkMtime = String((artifacts.latest_work || {}).mtime || '').trim();
  const latestVerifyPath = String((artifacts.latest_verify || {}).path || '').trim();
  const latestVerifyMtime = String((artifacts.latest_verify || {}).mtime || '').trim();
  const lastReceiptId = String(data.last_receipt_id || ((data.last_receipt || {}).receipt_id) || '').trim();

  if (!_deliveryState.initialized) {
    _deliveryState.initialized = true;
    _deliveryState.controlSeq = seq;
    _deliveryState.latestWorkPath = latestWorkPath;
    _deliveryState.latestWorkMtime = latestWorkMtime;
    _deliveryState.latestVerifyPath = latestVerifyPath;
    _deliveryState.latestVerifyMtime = latestVerifyMtime;
    _deliveryState.lastReceiptId = lastReceiptId;
    return;
  }

  if (seq != null && seq >= 0 && _deliveryState.controlSeq !== null && seq !== _deliveryState.controlSeq) {
    // Determine sender/receiver from control status
    const status = (data.control || {}).active_control_status || '';
    if (status === 'implement') {
      emitDelivery('Codex', 'Claude', '📋', {
        senderText: '구현 부탁드립니다',
        receiverText: '받았습니다',
        eventType: 'info',
        eventMsg: `Implement handoff → Claude (seq ${seq})`,
      });
    } else if (status === 'needs_operator') {
      emitDelivery('Claude', 'Codex', '⚠️', {
        senderText: '확인 필요합니다',
        receiverText: '운영자 대기합니다',
        eventType: 'warn',
        eventMsg: `Operator review requested (seq ${seq})`,
        sound: 'warn',
      });
    } else {
      emitDelivery('Claude', 'Codex', '📦', {
        senderText: '다음 단계로 넘깁니다',
        receiverText: '이어받겠습니다',
        eventType: 'info',
        eventMsg: `Control changed → ${status || 'none'} (seq ${seq})`,
      });
    }
  }

  const workChanged = latestWorkPath && latestWorkPath !== '—' && _deliveryState.latestWorkPath && (
    latestWorkPath !== _deliveryState.latestWorkPath ||
    (latestWorkMtime && latestWorkMtime !== _deliveryState.latestWorkMtime)
  );
  if (workChanged) {
    emitDelivery('Claude', 'Codex', '📁', {
      senderText: '작업 넘깁니다',
      receiverText: '검증 시작합니다',
      eventType: 'ok',
      eventMsg: `Work delivered → ${basename(latestWorkPath)}`,
      sound: 'success',
    });
  }

  const verifyChanged = latestVerifyPath && latestVerifyPath !== '—' && _deliveryState.latestVerifyPath && (
    latestVerifyPath !== _deliveryState.latestVerifyPath ||
    (latestVerifyMtime && latestVerifyMtime !== _deliveryState.latestVerifyMtime)
  );
  if (verifyChanged) {
    emitDelivery('Codex', 'Claude', '✅', {
      senderText: '검증 마쳤습니다',
      receiverText: '다음 라운드 확인',
      eventType: 'info',
      eventMsg: `Verify updated → ${basename(latestVerifyPath)}`,
    });
  }

  if (_deliveryState.lastReceiptId && lastReceiptId && lastReceiptId !== _deliveryState.lastReceiptId) {
    emitDelivery('Codex', 'Claude', '🧾', {
      senderText: 'receipt 발급 완료',
      receiverText: '라운드 종료 확인',
      eventType: 'ok',
      eventMsg: `Receipt issued → ${lastReceiptId}`,
      sound: 'success',
    });
  }

  _deliveryState.controlSeq = seq;
  _deliveryState.latestWorkPath = latestWorkPath;
  _deliveryState.latestWorkMtime = latestWorkMtime;
  _deliveryState.latestVerifyPath = latestVerifyPath;
  _deliveryState.latestVerifyMtime = latestVerifyMtime;
  _deliveryState.lastReceiptId = lastReceiptId;
}

// ═══════════════════════════════════════════════════════
// IDEA 3 — WEATHER & TIME (decorative only)
// Day/night tint + occasional rain when degraded
// ═══════════════════════════════════════════════════════
const Weather = {
  raindrops: [],
  MAX_RAIN: 60,

  /** Get time-of-day tint overlay */
  getTimeTint() {
    const h = new Date().getHours();
    if (h >= 6 && h < 9)   return 'rgba(255,200,100,0.04)'; // morning warm
    if (h >= 9 && h < 17)  return 'rgba(255,255,255,0.02)'; // daytime neutral
    if (h >= 17 && h < 20) return 'rgba(255,140,60,0.05)';  // sunset
    return 'rgba(20,30,80,0.12)'; // night
  },

  /** Update rain (active when degraded) */
  update(dt, isDegraded) {
    // Spawn rain when degraded
    if (isDegraded && this.raindrops.length < this.MAX_RAIN) {
      for (let i = 0; i < 2; i++) {
        this.raindrops.push({
          x: Math.random() * VIRTUAL_W,
          y: -10,
          speed: 300 + Math.random() * 200,
          len: 8 + Math.random() * 12,
          alpha: 0.15 + Math.random() * 0.2,
        });
      }
    }
    // Update existing
    for (let i = this.raindrops.length - 1; i >= 0; i--) {
      const r = this.raindrops[i];
      r.y += r.speed * dt;
      if (r.y > VIRTUAL_H + 20) this.raindrops.splice(i, 1);
    }
    // Fade out rain when not degraded
    if (!isDegraded && this.raindrops.length > 0) {
      // Let existing drops fall off screen naturally
    }
  },

  /** Draw weather effects on canvas */
  draw(ctx, cw, ch, scale) {
    // Time tint
    ctx.fillStyle = this.getTimeTint();
    ctx.fillRect(0, 0, cw, ch);

    // Rain
    if (this.raindrops.length > 0) {
      ctx.strokeStyle = 'rgba(150,180,220,0.35)';
      ctx.lineWidth = 1;
      for (const r of this.raindrops) {
        ctx.globalAlpha = r.alpha;
        ctx.beginPath();
        ctx.moveTo(r.x * scale, r.y * scale);
        ctx.lineTo((r.x - 2) * scale, (r.y + r.len) * scale);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
  },
};

// ═══════════════════════════════════════════════════════
// IDEA 4 — OFFICE PET (decorative cat NPC)
// Wanders, naps on sofa, alert when broken/degraded
// ═══════════════════════════════════════════════════════
const Pet = {
  x: 300, y: 500,
  targetX: 300, targetY: 500,
  state: 'idle',      // idle, walk, nap, alert
  facingRight: true,
  _timer: 3,
  _napTimer: 0,
  _blinkTimer: 2,
  _isBlinking: false,
  _tailPhase: 0,

  update(dt, hasBroken) {
    this._tailPhase += dt * 3;
    this._blinkTimer -= dt;
    if (this._blinkTimer <= 0) {
      this._isBlinking = !this._isBlinking;
      this._blinkTimer = this._isBlinking ? 0.1 : 2 + Math.random() * 4;
    }

    // React to broken/red-alert state
    if ((hasBroken || _redAlert) && this.state !== 'alert') {
      this.state = 'alert';
      this._timer = 5;
      // Panic — pick a random spot to bolt toward
      this.targetX = 200 + Math.random() * 600;
      this.targetY = 250 + Math.random() * 350;
    }

    switch (this.state) {
      case 'idle':
        this._timer -= dt;
        if (this._timer <= 0) {
          if (Math.random() < 0.4) {
            // Decide to nap on sofa
            this.state = 'walk';
            this.targetX = LOCATIONS.sofa.x + 20;
            this.targetY = LOCATIONS.sofa.y - 5;
            this._napTimer = 8 + Math.random() * 10;
          } else {
            // Wander randomly
            this.state = 'walk';
            this.targetX = 100 + Math.random() * 800;
            this.targetY = 420 + Math.random() * 200;
          }
        }
        break;

      case 'walk': {
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (Math.abs(dx) > 2) this.facingRight = dx > 0;
        if (dist > 3) {
          const spd = 40 * dt;
          this.x += (dx / dist) * spd;
          this.y += (dy / dist) * spd;
        } else {
          this.x = this.targetX; this.y = this.targetY;
          if (this._napTimer > 0) { this.state = 'nap'; }
          else { this.state = 'idle'; this._timer = 3 + Math.random() * 5; }
        }
        break;
      }

      case 'nap':
        this._napTimer -= dt;
        if (this._napTimer <= 0) {
          this.state = 'idle';
          this._timer = 4 + Math.random() * 6;
        }
        break;

      case 'alert': {
        this._timer -= dt;
        const dx2 = this.targetX - this.x;
        const dy2 = this.targetY - this.y;
        const d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
        // 1.5x speed during red alert (82 vs normal 55)
        const alertSpd = (_redAlert ? 82 : 55) * dt;
        if (d2 > 3) {
          if (Math.abs(dx2) > 2) this.facingRight = dx2 > 0;
          this.x += (dx2 / d2) * alertSpd;
          this.y += (dy2 / d2) * alertSpd;
        } else if (_redAlert || hasBroken) {
          // Arrived — pick another panic destination
          this.targetX = 150 + Math.random() * 700;
          this.targetY = 220 + Math.random() * 400;
        }
        if (this._timer <= 0 && !hasBroken && !_redAlert) {
          this.state = 'idle'; this._timer = 2;
        }
        break;
      }
    }
  },

  draw(ctx, scale) {
    const sx = this.x * scale;
    const sy = this.y * scale;
    const sz = 7 * scale;

    ctx.save();
    if (!this.facingRight) {
      ctx.translate(sx, 0);
      ctx.scale(-1, 1);
      ctx.translate(-sx, 0);
    }

    // Body (oval)
    ctx.fillStyle = this.state === 'alert' ? '#d97706' : '#8b6f5a';
    ctx.beginPath();
    ctx.ellipse(sx, sy, sz * 1.4, sz, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = this.state === 'alert' ? '#d97706' : '#a0846c';
    ctx.beginPath();
    ctx.arc(sx + sz * 1.2, sy - sz * 0.4, sz * 0.7, 0, Math.PI * 2);
    ctx.fill();

    // Ears
    ctx.fillStyle = '#6b5344';
    ctx.beginPath();
    ctx.moveTo(sx + sz * 1.5, sy - sz * 1.1);
    ctx.lineTo(sx + sz * 1.9, sy - sz * 1.8);
    ctx.lineTo(sx + sz * 2.1, sy - sz * 0.9);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx + sz * 0.7, sy - sz * 1.0);
    ctx.lineTo(sx + sz * 0.5, sy - sz * 1.8);
    ctx.lineTo(sx + sz * 1.1, sy - sz * 1.0);
    ctx.fill();

    // Eyes
    if (!this._isBlinking && this.state !== 'nap') {
      ctx.fillStyle = this.state === 'alert' ? '#fbbf24' : '#2dd4bf';
      ctx.beginPath();
      ctx.arc(sx + sz * 1.0, sy - sz * 0.5, 1.5 * scale, 0, Math.PI * 2);
      ctx.arc(sx + sz * 1.5, sy - sz * 0.5, 1.5 * scale, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.state === 'nap') {
      // Zzz
      ctx.font = `${8 * scale}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'center';
      ctx.fillText('💤', sx + sz * 1.2, sy - sz * 2);
    }

    // Tail (wagging)
    const tailWag = Math.sin(this._tailPhase) * 0.4;
    ctx.strokeStyle = this.state === 'alert' ? '#d97706' : '#8b6f5a';
    ctx.lineWidth = 2 * scale;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(sx - sz * 1.3, sy);
    ctx.quadraticCurveTo(
      sx - sz * 2.0, sy - sz * (1.0 + tailWag),
      sx - sz * 2.2, sy - sz * (0.5 + tailWag)
    );
    ctx.stroke();

    ctx.restore();
  },
};

// ═══════════════════════════════════════════════════════
// IDEA 5 — AMBIENT AUDIO (typing + room tone + mute)
// ═══════════════════════════════════════════════════════
const AmbientAudio = {
  _typingOsc: null,
  _typingGain: null,
  _toneOsc: null,
  _toneGain: null,
  _running: false,
  muted: false,
  _targetTypingVol: 0,

  toggle() {
    this.muted = !this.muted;
    const btn = document.getElementById('mute-btn');
    if (btn) {
      btn.textContent = this.muted ? '🔇' : '🔊';
      btn.title = this.muted ? '사운드 켜기' : '음소거';
    }
    PrefStore.set('office_muted', this.muted ? '1' : '0');
    if (this.muted) this._stop(); else this._start();
  },

  _start() {
    if (this._running || this.muted) return;
    const ac = SoundFX._ensure();
    if (!ac) return;
    this._running = true;

    // Room tone (very quiet low hum)
    this._toneOsc = ac.createOscillator();
    this._toneGain = ac.createGain();
    this._toneOsc.type = 'sine';
    this._toneOsc.frequency.value = 85;
    this._toneGain.gain.value = 0.008;
    this._toneOsc.connect(this._toneGain);
    this._toneGain.connect(ac.destination);
    this._toneOsc.start();

    // Typing noise (filtered noise via oscillator trick)
    this._typingOsc = ac.createOscillator();
    this._typingGain = ac.createGain();
    this._typingOsc.type = 'square';
    this._typingOsc.frequency.value = 200;
    this._typingGain.gain.value = 0;
    this._typingOsc.connect(this._typingGain);
    this._typingGain.connect(ac.destination);
    this._typingOsc.start();
  },

  _stop() {
    try { this._toneOsc?.stop(); } catch(e) {}
    try { this._typingOsc?.stop(); } catch(e) {}
    this._running = false;
    this._toneOsc = null; this._typingOsc = null;
    this._toneGain = null; this._typingGain = null;
  },

  /** Call each frame — adjust typing volume based on working agent count */
  update(workingCount) {
    if (!this._running || this.muted) return;
    // More working agents = slightly louder typing texture
    this._targetTypingVol = Math.min(0.015, workingCount * 0.005);
    if (this._typingGain) {
      const cur = this._typingGain.gain.value;
      this._typingGain.gain.value = cur + (this._targetTypingVol - cur) * 0.05;
    }
    // Randomize typing pitch for texture
    if (this._typingOsc && Math.random() < 0.1) {
      this._typingOsc.frequency.value = 150 + Math.random() * 300;
    }
  },
};

// ═══════════════════════════════════════════════════════
// TASK 2 — NEEDS_OPERATOR CANVAS OVERLAY
// Red pulsing border + large centered warning text
// ═══════════════════════════════════════════════════════
let _needsOperator = false;
let _needsOperatorPhase = 0;
let _redAlert = false;       // BROKEN or watcher dead
let _redAlertPhase = 0;
let _fireTimer = 0;

function drawNeedsOperatorOverlay(ctx, cw, ch, dt) {
  if (!_needsOperator && !_redAlert) return;

  // ═══ RED ALERT — BROKEN / watcher dead ═══
  if (_redAlert) {
    _redAlertPhase += dt * 4;
    const siren = 0.06 + Math.sin(_redAlertPhase) * 0.06; // 0.00 ~ 0.12

    ctx.save();
    // Full-screen red wash
    ctx.fillStyle = `rgba(255,0,0,${siren})`;
    ctx.fillRect(0, 0, cw, ch);

    // Heavy red border
    const borderPulse = 0.5 + Math.sin(_redAlertPhase * 1.3) * 0.3;
    ctx.strokeStyle = `rgba(239,30,30,${borderPulse})`;
    ctx.lineWidth = 8;
    ctx.strokeRect(4, 4, cw - 8, ch - 8);

    // RED ALERT text
    const textPulse = 0.6 + Math.sin(_redAlertPhase * 2) * 0.35;
    ctx.globalAlpha = textPulse;
    ctx.font = `bold ${22}px 'Noto Sans KR', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff4444';
    ctx.fillText('🚨 RED ALERT', cw / 2, 28);
    ctx.font = `bold ${12}px sans-serif`;
    ctx.fillStyle = '#fca5a5';
    ctx.fillText('PIPELINE BROKEN — 즉시 확인 필요', cw / 2, 52);

    ctx.restore();
    return; // Red alert supersedes needs_operator
  }

  // ═══ NEEDS OPERATOR (amber, existing) ═══
  _needsOperatorPhase += dt * 3;
  const pulse = 0.4 + Math.sin(_needsOperatorPhase) * 0.2;

  ctx.save();
  ctx.strokeStyle = `rgba(239,68,68,${pulse})`;
  ctx.lineWidth = 6;
  ctx.strokeRect(3, 3, cw - 6, ch - 6);

  const textAlpha = 0.5 + Math.sin(_needsOperatorPhase * 1.5) * 0.3;
  ctx.globalAlpha = textAlpha;
  ctx.font = `bold ${18}px 'Noto Sans KR', sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fca5a5';
  ctx.fillText('⚠ OPERATOR NEEDED', cw / 2, 30);
  ctx.font = `${11}px sans-serif`;
  ctx.fillStyle = 'rgba(252,165,165,0.6)';
  ctx.fillText('needs_operator — 운영자 확인 필요', cw / 2, 52);
  ctx.restore();
}

/** Spawn fire/smoke particles from server rack during red alert */
function spawnFireParticles(dt) {
  if (!_redAlert) return;
  _fireTimer += dt;
  if (_fireTimer < 0.08) return; // throttle: ~12 particles/sec
  _fireTimer = 0;

  // Server rack position
  const fx = LOCATIONS.server_room.x;
  const fy = LOCATIONS.server_room.y;

  // Fire particle (orange/red, rises fast)
  particles.push(new Particle(
    fx + (Math.random() - 0.5) * 30,
    fy,
    Math.random() < 0.5 ? '🔥' : '🟠',
    { size: 10 + Math.random() * 8, lifetime: 0.8 + Math.random() * 0.6 }
  ));

  // Smoke particle (gray, rises slow, longer life)
  if (Math.random() < 0.5) {
    const smoke = new Particle(
      fx + (Math.random() - 0.5) * 40,
      fy - 10,
      '🌫️',
      { size: 12 + Math.random() * 6, lifetime: 1.8 + Math.random() * 1.2 }
    );
    smoke.driftY = -(12 + Math.random() * 8); // slower rise
    smoke.driftX = (Math.random() - 0.5) * 20;
    particles.push(smoke);
  }
}

// ═══════════════════════════════════════════════════════
// BROWSER-LOCAL STORAGE HELPER
// Wraps localStorage access with one-time failure detection.
// On first failure, surfaces a non-authoritative event signal
// so the operator knows toolbar preferences will not persist.
// ═══════════════════════════════════════════════════════
const PrefStore = (() => {
  let _available = null; // null = untested, true/false after probe
  function _probe() {
    if (_available !== null) return _available;
    try {
      const k = '__office_storage_probe__';
      localStorage.setItem(k, '1');
      localStorage.removeItem(k);
      _available = true;
    } catch (e) {
      _available = false;
      pushEvent('warn', '환경 설정 저장 불가 — 새로고침 시 toolbar 설정이 초기화됩니다');
    }
    return _available;
  }
  return {
    get(key) { return _probe() ? localStorage.getItem(key) : null; },
    set(key, val) { if (_probe()) localStorage.setItem(key, val); },
    get available() { return _probe(); },
  };
})();

// ═══════════════════════════════════════════════════════
// LOW-MOTION MODE — browser-local decorative motion gate
// ═══════════════════════════════════════════════════════
let _lowMotion = false;

function _applyLowMotionUI() {
  const btn = document.getElementById('motion-btn');
  if (btn) {
    btn.textContent = _lowMotion ? '🚫' : '✨';
    btn.title = _lowMotion ? '장식 효과 켜기' : '장식 효과 줄이기';
  }
}

function toggleLowMotion() {
  _lowMotion = !_lowMotion;
  _applyLowMotionUI();
  PrefStore.set('office_low_motion', _lowMotion ? '1' : '0');
  if (_lowMotion) {
    particles.length = 0;
    deliveryPackets.length = 0;
    drones.length = 0;
  }
}

// Restore low-motion preference from browser-local storage
if (PrefStore.get('office_low_motion') === '1') { _lowMotion = true; _applyLowMotionUI(); }

// ═══════════════════════════════════════════════════════
// MAIN LOOP (updated with all ideas)
// ═══════════════════════════════════════════════════════
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  // Determine scene state
  const rd = runtimeData || {};
  const isDegraded = Boolean((rd.degraded_reasons || []).length || rd.degraded_reason);
  const hasBroken = [...agents.values()].some(a => a.state === 'broken' || a.state === 'dead');
  const workingCount = [...agents.values()].filter(a => a.state === 'working').length;
  const watcherDead = rd.watcher && rd.watcher.alive === false && !INACTIVE_RUNTIME_STATES.has(rd.runtime_state);
  const runtimeBroken = String(rd.runtime_state || '').toUpperCase() === 'BROKEN';
  _redAlert = runtimeBroken || watcherDead;

  // Fire/smoke particles during red alert
  if (!_lowMotion) spawnFireParticles(dt);

  // Update systems
  for (const a of agents.values()) a.update(dt);
  if (!_lowMotion) {
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update(dt);
      if (!particles[i].alive) particles.splice(i, 1);
    }
    for (let i = deliveryPackets.length - 1; i >= 0; i--) {
      deliveryPackets[i].update(dt);
      if (!deliveryPackets[i].alive) deliveryPackets.splice(i, 1);
    }
    for (let i = drones.length - 1; i >= 0; i--) {
      drones[i].update(dt);
      if (!drones[i].alive) drones.splice(i, 1);
    }
    Weather.update(dt, isDegraded);
    Pet.update(dt, hasBroken);
    processIdleChatter();
  }
  AmbientAudio.update(workingCount);

  // ── Render ──
  ctx.clearRect(0, 0, cw, ch);
  OfficeRenderer.drawRoom(ctx, cw, ch, scale);

  // Monitor matrix + hologram (under agents, over background)
  const latestWorkPath = ((rd.artifacts || {}).latest_work || {}).path || '';
  const workFile = latestWorkPath ? basename(latestWorkPath) : '';
  for (const [name, agent] of agents) {
    const key = name.toLowerCase();
    if (agent.state === 'working' && MONITOR_SCREENS[key]) {
      MonitorFX.drawMatrix(ctx, scale, key, dt);
      if (workFile) MonitorFX.drawHologram(ctx, scale, key, workFile, now / 1000);
    }
  }

  if (!_lowMotion) {
    // Weather tint + rain (under agents)
    Weather.draw(ctx, cw, ch, scale);
  }

  // Agents sorted by Y
  const sorted = [...agents.values()].sort((a, b) => a.y - b.y);
  if (!_lowMotion) {
    // Insert pet into depth sort
    let petDrawn = false;
    for (const a of sorted) {
      if (!petDrawn && Pet.y < a.y) { Pet.draw(ctx, scale); petDrawn = true; }
      a.draw(ctx, scale);
    }
    if (!petDrawn) Pet.draw(ctx, scale);
  } else {
    for (const a of sorted) a.draw(ctx, scale);
  }

  if (!_lowMotion) {
    // Delivery packets
    for (const d of deliveryPackets) d.draw(ctx, scale);
    // Drones (above agents)
    for (const dr of drones) dr.draw(ctx, scale);
    // Particles on top
    for (const p of particles) p.draw(ctx, scale);
  }

  // Needs-operator overlay (topmost)
  drawNeedsOperatorOverlay(ctx, cw, ch, dt);
}
requestAnimationFrame(loop);

// ═══════════════════════════════════════════════════════
// EVENT LOG & API POLLER
// ═══════════════════════════════════════════════════════
function pushEvent(type, msg) {
  const t = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  eventLog.unshift({ type, msg, time: t });
  if (eventLog.length > MAX_EVENTS) eventLog.length = MAX_EVENTS;
  renderEvents();
}

function renderEvents() {
  const el = document.getElementById('event-list');
  if (!eventLog.length) { el.innerHTML = '<div class="event-item"><span class="event-time">—</span><span class="event-msg">대기 중</span></div>'; return; }
  el.innerHTML = eventLog.map(e => `<div class="event-item"><span class="event-time">${esc(e.time)}</span><span class="event-dot ${e.type}"></span><span class="event-msg">${esc(e.msg)}</span></div>`).join('');
}
_eventLogReady = true;
_flushBackgroundSignals();

function runtimeBadgeClass(runtimeState) {
  if (runtimeState === 'RUNNING') return 'running';
  if (runtimeState === 'DEGRADED') return 'degraded';
  if (runtimeState === 'STOPPING') return 'stopping';
  if (runtimeState === 'BROKEN') return 'broken';
  return 'stopped';
}

function getRuntimePresentation(data) {
  const runtimeState = String(data.runtime_state || 'STOPPED').toUpperCase();
  const control = data.control || {};
  const watcher = data.watcher || {};
  const round = data.active_round || {};
  const degradedReasons = (data.degraded_reasons || []).filter(Boolean);
  const degradedReason = degradedReasons[0] || String(data.degraded_reason || '').trim();
  const uncertain = runtimeState === 'DEGRADED' && degradedReasons.some(reason => UNCERTAIN_RUNTIME_REASONS.has(reason));
  const inactive = INACTIVE_RUNTIME_STATES.has(runtimeState);
  const showLiveRuntime = !inactive && !uncertain;
  const controlStatus = showLiveRuntime ? (control.active_control_status || 'none') : (uncertain ? 'uncertain' : 'none');
  const roundState = showLiveRuntime ? (round.state || 'IDLE') : (uncertain ? 'uncertain' : 'IDLE');
  let watcherStatus = 'Dead';
  let watcherClass = 'dim';
  if (uncertain) {
    watcherStatus = 'Unknown';
    watcherClass = 'warn';
  } else if (watcher.alive) {
    watcherStatus = 'Alive';
    watcherClass = 'ok';
  } else if (runtimeState === 'BROKEN') {
    watcherClass = 'err';
  } else if (runtimeState === 'STOPPING') {
    watcherClass = 'neutral';
  }
  const controlClass = controlStatus === 'implement'
    ? 'ok'
    : controlStatus === 'needs_operator' || controlStatus === 'uncertain'
      ? 'warn'
      : controlStatus === 'none'
        ? 'dim'
        : 'neutral';
  const roundClass = roundState === 'uncertain' ? 'warn' : roundState === 'IDLE' ? 'dim' : 'neutral';
  const runtimeClass = runtimeState === 'RUNNING'
    ? 'ok'
    : runtimeState === 'DEGRADED'
      ? 'warn'
      : runtimeState === 'STOPPING'
        ? 'neutral'
        : runtimeState === 'BROKEN'
          ? 'err'
          : 'dim';
  return {
    runtimeState,
    runtimeClass,
    badgeClass: runtimeBadgeClass(runtimeState),
    uncertain,
    inactive,
    controlStatus,
    controlClass,
    roundState,
    roundClass,
    watcherStatus,
    watcherClass,
    degradedReason,
  };
}

function detectChanges(data) {
  const presentation = getRuntimePresentation(data);
  const rs = presentation.runtimeState;
  const cs = presentation.controlStatus;
  const ws = presentation.watcherStatus;
  const uncertaintyChanged = _prev.uncertainRuntime !== null && _prev.uncertainRuntime !== presentation.uncertain;

  if (_prev.runtimeState !== null && _prev.runtimeState !== rs) {
    const runtimeEventType = rs === 'RUNNING' ? 'ok' : rs === 'DEGRADED' ? 'warn' : rs === 'BROKEN' ? 'err' : 'info';
    pushEvent(runtimeEventType, `Runtime: ${_prev.runtimeState} → ${rs}`);
  }
  _prev.runtimeState = rs;

  if (uncertaintyChanged) {
    pushEvent(
      presentation.uncertain ? 'warn' : 'info',
      presentation.uncertain ? `Runtime truth uncertain: ${presentation.degradedReason || AMBIGUOUS_RUNTIME_REASON}` : 'Runtime truth restored',
    );
  }
  _prev.uncertainRuntime = presentation.uncertain;

  if (!uncertaintyChanged && _prev.controlStatus !== null && _prev.controlStatus !== cs) {
    const t = cs === 'implement' ? 'ok' : cs === 'needs_operator' || cs === 'uncertain' ? 'warn' : 'info';
    pushEvent(t, `Control: ${_prev.controlStatus} → ${cs}`);
    if (cs === 'needs_operator') SoundFX.warn();
  }
  _prev.controlStatus = cs;

  if (!uncertaintyChanged && _prev.watcherStatus !== null && _prev.watcherStatus !== ws) {
    const t = ws === 'Alive' ? 'ok' : ws === 'Unknown' ? 'warn' : 'err';
    pushEvent(t, `Watcher: ${_prev.watcherStatus} → ${ws}`);
  }
  _prev.watcherStatus = ws;

  for (const lane of (data.lanes ||[])) {
    const n = lane.name || ''; const s = (lane.state || 'off').toLowerCase(); const p = _prev.laneStates[n];
    if (p !== undefined && p !== s) {
      const t = s === 'working' ? 'ok' : (s === 'broken' || s === 'dead') ? 'err' : 'info';
      pushEvent(t, `${n}: ${p} → ${s}`);
      spawnEventParticle(n, t);
      // Drone delivery when agent starts working
      if (s === 'working' && p !== 'working') spawnDrone(n);
    }
    _prev.laneStates[n] = s;
  }
}

async function poll() {
  try {
    const res  = await fetch('/api/runtime/status');
    const data = await res.json();
    runtimeData = data;
    const presentation = getRuntimePresentation(data);
    detectChanges(data);
    _needsOperator = ((data.control || {}).active_control_status === 'needs_operator');

    // Ambient audio requires explicit user gesture (mute button toggle).
    // Do not auto-start from poll().

    const badge = document.getElementById('status-badge');
    badge.textContent = presentation.runtimeState;
    badge.className = 'badge ' + presentation.badgeClass;
    document.getElementById('project-path').textContent = data.project_root || '—';

    const lanes = data.lanes ||[];
    const seenNames = new Set();
    for (const lane of lanes) {
      const name = lane.name || ''; seenNames.add(name);
      if (!agents.has(name)) agents.set(name, new Agent(name));
      agents.get(name).applyLaneData(lane);
    }
    for (const[name, agent] of agents) {
      if (!seenNames.has(name)) {
        agent._gifEl?.remove(); // cleanup GIF overlay
        agents.delete(name);
      }
    }

    checkDeliveryTrigger(data);
    renderAgentCards(lanes);
    renderRuntimeInfo(data, presentation);
  } catch (e) {
    document.getElementById('status-badge').textContent = 'API Error';
    document.getElementById('status-badge').className = 'badge broken';
  }
}

// Sidebar Renderers
function renderAgentCards(lanes) {
  const el = document.getElementById('agent-cards');
  if (!lanes.length) { el.innerHTML = '<div style="font-size:11px;color:#3d5070">에이전트 없음</div>'; return; }
  el.innerHTML = lanes.map(lane => {
    const s = (lane.state || 'off').toLowerCase(), color = STATE_COLORS[s] || STATE_COLORS.off;
    const role = LANE_ROLES[(lane.name || '').toLowerCase()] || '', note = lane.note || lane.status_note || '';
    const initial = (lane.name || '?')[0].toUpperCase();
    const agent = agents.get(lane.name || '');
    const fatigue = agent ? agent.fatigueState : '';
    const fatigueLabel = fatigue === 'coffee' ? '☕ 커피 충전 중' : fatigue === 'fatigued' ? '💦 피로 누적' : '';
    return `<div class="agent-card" data-agent="${esc(lane.name || '')}" data-fatigue="${fatigue}"><div class="agent-avatar" style="background:${color}">${esc(initial)}</div>
      <div class="agent-info"><div class="agent-name">${esc(lane.name || '?')}</div><div class="agent-role">${esc(role)}</div>
      ${note ? `<div class="agent-detail">${esc(truncate(note, 50))}</div>` : ''}
      ${fatigueLabel ? `<div class="agent-fatigue" data-fatigue="${fatigue}">${fatigueLabel}</div>` : ''}</div>
      <div class="agent-state-dot" style="background:${color}" title="${esc(s)}"></div></div>`;
  }).join('');
}

function renderRuntimeInfo(data, presentation = getRuntimePresentation(data)) {
  const el = document.getElementById('runtime-info');
  const lr = data.last_receipt || {}, lw = (data.artifacts || {}).latest_work || {}, dr = (data.degraded_reasons ||[]).filter(Boolean);
  const sceneState = _bgReady ? (_bgSource === BACKGROUND_ASSET_CANDIDATES[0] ? 'root' : 'fallback') : (_bgLoadError ? 'asset_error' : 'loading');
  const sceneClass = _bgReady ? (_bgSource === BACKGROUND_ASSET_CANDIDATES[0] ? 'ok' : 'warn') : (_bgLoadError ? 'err' : 'neutral');
  el.innerHTML = `
    <div class="info-row"><span class="info-label">상태</span><span class="info-value ${presentation.runtimeClass}">${esc(presentation.runtimeState)}</span></div>
    <div class="info-row"><span class="info-label">Control</span><span class="info-value ${presentation.controlClass}">${esc(presentation.controlStatus)}</span></div>
    <div class="info-row"><span class="info-label">Round</span><span class="info-value ${presentation.roundClass}">${esc(presentation.roundState)}</span></div>
    <div class="info-row"><span class="info-label">Watcher</span><span class="info-value ${presentation.watcherClass}">${esc(presentation.watcherStatus)}</span></div>
    <div class="info-row"><span class="info-label">Scene</span><span class="info-value ${sceneClass}">${esc(sceneState)}</span></div>
    ${lr.verify_result ? `<div class="info-row"><span class="info-label">Receipt</span><span class="info-value">${esc(lr.verify_result)}</span></div>` : ''}
    ${lw.path ? `<div class="info-row"><span class="info-label">Work</span><span class="info-value">${esc(basename(lw.path))}</span></div>` : ''}
    ${dr.length ? `<div class="info-row"><span class="info-label">Degraded</span><span class="info-value ${presentation.uncertain ? 'warn' : 'err'}">${esc(presentation.degradedReason || dr[0])}</span></div>` : ''}
  `;
}

// Sound FX
const SoundFX = {
  _ctx: null, _enabled: true,
  _ensure() {
    if (!this._ctx) { try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { this._enabled = false; } }
    if (this._ctx && this._ctx.state === 'suspended') this._ctx.resume();
    return this._ctx;
  },
  _play(notes, { gain = 0.12, type = 'square' } = {}) {
    if (!this._enabled) return; const ctx = this._ensure(); if (!ctx) return;
    const now = ctx.currentTime, osc = ctx.createOscillator(), vol = ctx.createGain();
    osc.type = type; osc.connect(vol); vol.connect(ctx.destination);
    let t = now;
    for (const[freq, dur] of notes) {
      osc.frequency.setValueAtTime(freq, t); vol.gain.setValueAtTime(gain, t);
      vol.gain.setValueAtTime(gain, t + dur * 0.7); vol.gain.linearRampToValueAtTime(0, t + dur); t += dur;
    }
    osc.start(now); osc.stop(t);
  },
  click() { this._play([[880, 0.06]], { gain: 0.08 }); },
  success() { this._play([[523, 0.08],[659, 0.08],[784, 0.12]], { gain: 0.10 }); },
  error() { this._play([[220, 0.12],[165, 0.18]], { gain: 0.13, type: 'sawtooth' }); },
  warn() { this._play([[440, 0.08],[0, 0.06],[440, 0.08]], { gain: 0.09 }); },
  blip() { this._play([[660, 0.05]], { gain: 0.06 }); },
};

async function apiPost(path) {
  SoundFX.click();
  try {
    const res  = await fetch(path, { method: 'POST' });
    const data = await res.json();
    if (!res.ok || data.ok === false) { pushEvent('err', '요청 실패: ' + (data.error || 'unknown')); SoundFX.error(); }
    else {
      pushEvent('ok', path.split('/').pop() + ' 완료');
      if (path.includes('start')) SoundFX.success(); else if (path.includes('stop')) SoundFX.warn(); else SoundFX.blip();
    }
    setTimeout(poll, 1200);
  } catch (e) { pushEvent('err', '요청 실패: ' + e.message); SoundFX.error(); }
}

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function basename(p) { return String(p || '').split('/').filter(Boolean).pop() || '—'; }
function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

// BOOT
// Restore muted preference from browser-local storage (keep audio off, no autoplay)
if (PrefStore.get('office_muted') === '1') {
  AmbientAudio.muted = true;
  const mb = document.getElementById('mute-btn');
  if (mb) { mb.textContent = '🔇'; mb.title = '사운드 켜기'; }
}
// Show toolbar storage-unavailable indicator if preference persistence is blocked
if (!PrefStore.available) {
  const sw = document.getElementById('storage-warn');
  if (sw) sw.style.display = 'inline-block';
}
SpriteManager.init();
setInterval(poll, POLL_MS);
poll();
</script>
