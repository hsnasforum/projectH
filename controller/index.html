<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Controller — Office</title>
<style>
  /* ═══════════════════════════════════════ */
  /* Reset & Base                           */
  /* ═══════════════════════════════════════ */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
    background: #0a0c14; color: #cdd6e4;
  }

  /* ═══════════════════════════════════════ */
  /* Toolbar                                */
  /* ═══════════════════════════════════════ */
  .toolbar {
    display: flex; align-items: center; gap: 12px;
    height: 44px; padding: 0 16px;
    background: #111520; border-bottom: 1px solid #1e2636;
  }
  .toolbar .title {
    font-size: 14px; font-weight: 700; color: #60a5fa;
    letter-spacing: 0;
  }
  .toolbar .badge {
    font-size: 11px; font-weight: 700; padding: 2px 10px;
    border-radius: 999px; text-transform: uppercase; letter-spacing: .04em;
  }
  .badge.running  { background: #064e3b; color: #34d399; }
  .badge.stopped  { background: #7f1d1d; color: #fca5a5; }
  .badge.degraded { background: #78350f; color: #fbbf24; }
  .badge.stopping { background: #1d3557; color: #93c5fd; }
  .badge.broken   { background: #451a1a; color: #f87171; }
  .toolbar .spacer { flex: 1; }
  .toolbar .btn {
    padding: 4px 12px; border: 1px solid #2b3548; border-radius: 6px;
    background: #161c2a; color: #8fa3b8; font-size: 11px; cursor: pointer;
    font-family: inherit; transition: background 80ms;
  }
  .toolbar .btn:hover { background: #1e2840; color: #cdd6e4; }
  .toolbar .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .toolbar .storage-warn {
    display: none; font-size: 10px; color: #fbbf24; padding: 2px 8px;
    border: 1px solid #78350f; border-radius: 6px; background: rgba(120,53,15,0.3);
    white-space: nowrap; cursor: default;
  }
  .toolbar .project-path {
    font-size: 10px; color: #3d4e5e;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 28vw;
  }

  /* ═══════════════════════════════════════ */
  /* Main Layout                            */
  /* ═══════════════════════════════════════ */
  .main {
    display: flex; height: calc(100vh - 44px);
  }
  .canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: #0d1018;
  }
  #office {
    display: block; width: 100%; height: 100%;
    image-rendering: pixelated;
  }

  /* ═══════════════════════════════════════ */
  /* Sidebar                                */
  /* ═══════════════════════════════════════ */
  .sidebar {
    width: 260px; flex-shrink: 0;
    background: #111520; border-left: 1px solid #1e2636;
    overflow-y: auto; overflow-x: hidden;
    padding: 14px 12px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #2b3548; border-radius: 999px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }

  .section-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: #3d5070; margin-bottom: 8px;
  }

  /* Agent cards */
  .agent-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 10px;
    background: #161c2a; border: 1px solid #1e2636;
    margin-bottom: 6px; cursor: pointer;
    transition: background 80ms, border-color 80ms;
  }
  .agent-card:hover { background: #1a2236; border-color: #2b3a52; }
  .agent-avatar {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: #0a0c14;
    flex-shrink: 0;
  }
  .agent-info { flex: 1; min-width: 0; }
  .agent-name { font-size: 12px; font-weight: 700; color: #e2e8f0; }
  .agent-role { font-size: 9px; color: #4a6080; text-transform: uppercase; letter-spacing: .08em; }
  .agent-detail { font-size: 10px; color: #5a7090; margin-top: 2px; line-height: 1.3; }
  .agent-state-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .agent-fatigue {
    font-size: 9px; color: #fbbf24; margin-top: 2px;
    letter-spacing: .02em;
  }
  .agent-fatigue[data-fatigue="coffee"] { color: #34d399; }

  /* Info rows */
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0; font-size: 11px;
  }
  .info-label { color: #3d5070; }
  .info-value { color: #8fa3b8; font-weight: 600; text-align: right;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .info-value.ok      { color: #34d399; }
  .info-value.warn    { color: #fbbf24; }
  .info-value.err     { color: #f87171; }
  .info-value.neutral { color: #60a5fa; }
  .info-value.dim     { color: #70839b; }

  /* Event log */
  .event-list { max-height: 160px; overflow-y: auto; }
  .event-item {
    display: flex; gap: 6px; align-items: flex-start;
    padding: 3px 0; font-size: 10px; line-height: 1.35;
  }
  .event-time { color: #2a3a4e; min-width: 36px; flex-shrink: 0; font-size: 9px; }
  .event-dot  { width: 5px; height: 5px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
  .event-dot.ok   { background: #34d399; }
  .event-dot.warn { background: #fbbf24; }
  .event-dot.err  { background: #f87171; }
  .event-dot.info { background: #3b82f6; }
  .event-msg  { color: #5a7a98; }

  /* Controls section */
  .controls-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .controls-row .btn {
    padding: 5px 14px; border: 1px solid #2b3548; border-radius: 6px;
    background: #161c2a; color: #8fa3b8; font-size: 11px; cursor: pointer;
    font-family: inherit;
  }
  .controls-row .btn:hover { background: #1e2840; }

  /* Tooltip on canvas */
  .canvas-tooltip {
    display: none; position: absolute; z-index: 100;
    padding: 6px 10px; border-radius: 8px;
    background: rgba(14,18,30,0.94); border: 1px solid #2b3a52;
    color: #c0cee0; font-size: 11px; pointer-events: none;
    backdrop-filter: blur(6px); white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  }
  .canvas-tooltip .tt-name { font-weight: 700; color: #e2e8f0; }
  .canvas-tooltip .tt-state { font-size: 10px; margin-top: 2px; }
  .canvas-tooltip .tt-note { font-size: 9px; color: #5a7a98; margin-top: 2px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }

  /* ═══ Terminal Log Modal ═══ */
  .log-modal-backdrop {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(5,8,16,0.78); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .log-modal-backdrop.open { display: flex; }
  .log-modal {
    background: #0c1018; border: 1px solid #1e2a40; border-radius: 14px;
    width: min(1360px, 98vw); max-height: 88vh;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 72px rgba(0,0,0,0.65); overflow: hidden;
  }
  .log-modal-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: #111828; border-bottom: 1px solid #1e2a40;
  }
  .log-modal-header .lm-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .log-modal-header .lm-name { font-size: 14px; font-weight: 700; color: #e2e8f0; }
  .log-modal-header .lm-role { font-size: 10px; color: #4a6080; text-transform: uppercase; }
  .log-modal-header .lm-state {
    font-size: 10px; padding: 2px 9px; border-radius: 999px; font-weight: 700; letter-spacing: .03em;
  }
  .lm-actions {
    margin-left: auto; display: flex; gap: 4px; align-items: center;
  }
  .lm-actions .lm-act {
    padding: 3px 8px; border: 1px solid #1e2a40; border-radius: 5px;
    background: transparent; color: #5a7a98; font-size: 10px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: background 80ms, color 80ms;
  }
  .lm-actions .lm-act:hover { background: #1a2538; color: #c0d0e0; }
  .lm-actions .lm-act:active { background: #243050; }
  .lm-actions .lm-close {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid #1e2a40; background: transparent; color: #5a7090;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    margin-left: 4px;
  }
  .lm-actions .lm-close:hover { background: #1a2236; color: #ccc; }
  .log-modal-info {
    display: flex; gap: 8px 14px; flex-wrap: wrap; padding: 8px 16px; font-size: 10px; color: #3d5a78;
    border-bottom: 1px solid #141e30;
  }
  .log-modal-info span { white-space: normal; }
  .log-modal-body {
    flex: 1; overflow: auto; padding: 14px 16px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 11px; line-height: 1.65; color: #7a94a8;
    white-space: pre; word-break: keep-all; overflow-wrap: normal;
    background: #080c14; min-height: 200px; width: 100%; min-width: 0;
  }
  .log-modal-body::-webkit-scrollbar { width: 5px; height: 5px; }
  .log-modal-body::-webkit-scrollbar-thumb { background: #1e2a40; border-radius: 999px; }
  .log-modal-body::-webkit-scrollbar-track { background: transparent; }
  .log-modal-body .log-loading { color: #3d5a78; font-style: italic; }
</style>
</head>
<body>

<!-- ═══ Toolbar ═══ -->
<div class="toolbar">
  <span class="title">Pipeline Office</span>
  <span class="badge stopped" id="status-badge">Stopped</span>
  <div class="spacer"></div>
  <button class="btn" id="btn-start" onclick="apiPost('/api/runtime/start')">Start</button>
  <button class="btn" id="btn-stop"  onclick="apiPost('/api/runtime/stop')">Stop</button>
  <button class="btn" id="btn-restart" onclick="apiPost('/api/runtime/restart')">Restart</button>
  <button class="btn" id="mute-btn" onclick="AmbientAudio.toggle()" title="음소거" style="font-size:13px;padding:2px 8px">🔊</button>
  <button class="btn" id="motion-btn" onclick="toggleLowMotion()" title="장식 효과 줄이기" style="font-size:13px;padding:2px 8px">✨</button>
  <span class="storage-warn" id="storage-warn" title="localStorage 사용 불가 — 새로고침 시 toolbar 설정이 초기화됩니다">⚠ 설정 비저장</span>
  <span class="project-path" id="project-path">—</span>
</div>

<!-- ═══ Main ═══ -->
<div class="main">
  <div class="canvas-wrap">
    <canvas id="office"></canvas>
    <div class="canvas-tooltip" id="tooltip">
      <div class="tt-name"></div>
      <div class="tt-state"></div>
      <div class="tt-note"></div>
    </div>
  </div>

  <!-- Terminal Log Modal -->
  <div class="log-modal-backdrop" id="log-modal" onclick="closeLogModal(event)">
    <div class="log-modal" onclick="event.stopPropagation()">
      <div class="log-modal-header">
        <div class="lm-dot" id="lm-dot"></div>
        <span class="lm-name" id="lm-name">Agent</span>
        <span class="lm-role" id="lm-role"></span>
        <span class="lm-state" id="lm-state">—</span>
        <div class="lm-actions">
          <button class="lm-close" onclick="closeLogModal()">×</button>
        </div>
      </div>
      <div class="log-modal-info" id="lm-info"></div>
      <div class="log-modal-body" id="lm-body"><span class="log-loading">대기 중...</span></div>
    </div>
  </div>

  <div class="sidebar">
    <!-- Agents -->
    <div>
      <div class="section-title">에이전트</div>
      <div id="agent-cards"></div>
    </div>

    <!-- Runtime info -->
    <div>
      <div class="section-title">Runtime</div>
      <div id="runtime-info"></div>
    </div>

    <!-- Controls -->
    <div>
      <div class="section-title">Controls</div>
      <div class="controls-row">
        <button class="btn" onclick="apiPost('/api/runtime/start')">▶ Start</button>
        <button class="btn" onclick="apiPost('/api/runtime/stop')">■ Stop</button>
        <button class="btn" onclick="apiPost('/api/runtime/restart')">↻ Restart</button>
      </div>
    </div>

    <!-- Events -->
    <div>
      <div class="section-title">이벤트</div>
      <div class="event-list" id="event-list">
        <div class="event-item"><span class="event-time">—</span><span class="event-msg">대기 중</span></div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const POLL_MS    = 2000;
const VIRTUAL_W  = 1000;
const VIRTUAL_H  = 700;
const WALK_SPEED = 120; // 걷기 속도 (픽셀/초)

const STATE_COLORS = {
  working: '#34d399',
  ready:   '#60a5fa',
  booting: '#fbbf24',
  broken:  '#ef4444',
  dead:    '#991b1b',
  off:     '#475569',
  unknown: '#a78bfa',
};

const LANE_ROLES = {
  claude: 'implement',
  codex:  'verify',
  gemini: 'advisory',
};

const STATE_GIF_ASSETS = {
  booting: '/controller-assets/BOOTING.gif',
  working: '/controller-assets/WORKING.gif',
  broken: '/controller-assets/BROKEN.gif',
  ready: '/controller-assets/READY.gif',
  dead: '/controller-assets/DEAD.gif',
};
const AMBIGUOUS_RUNTIME_REASON = 'supervisor_missing_recent_ambiguous';
const UNDATED_AMBIGUOUS_RUNTIME_REASON = 'supervisor_missing_snapshot_undated';
const UNCERTAIN_RUNTIME_REASONS = new Set([AMBIGUOUS_RUNTIME_REASON, UNDATED_AMBIGUOUS_RUNTIME_REASON]);
const INACTIVE_RUNTIME_STATES = new Set(['STOPPED', 'STOPPING', 'BROKEN']);

// ═══════════════════════════════════════════════════════
// SPRITE MANAGER
// ═══════════════════════════════════════════════════════
const SpriteManager = {
  manifest: null,
  stateGifs: {},
  frames: {},
  sequences: {},
  loaded: false,

  async init() {
    for (const[state, src] of Object.entries(STATE_GIF_ASSETS)) {
      const img = new Image();
      img.src = src;
      this.stateGifs[state] = img;
    }
    this.stateGifs.off = this.stateGifs.dead || null;
    this.stateGifs.idle = this.stateGifs.ready || null;
    this.stateGifs.unknown = this.stateGifs.ready || null;

    try {
      const res = await fetch('/controller-assets/generated/office-sprite-manifest.json');
      this.manifest = await res.json();

      for (const [state, config] of Object.entries(this.manifest.states || {})) {
        this.frames[state] = (config.frames ||[]).map(f => {
          const img = new Image();
          img.src = f.src;
          return img;
        });
        this.sequences[state] = {
          sequence: config.sequence || [0],
          intervalMs: config.interval_ms || 180,
        };
      }
      this.frames.off = this.frames.dead ||[];
      this.frames.idle = this.frames.ready ||[];
      this.frames.unknown = this.frames.ready ||[];
      this.sequences.off = this.sequences.dead || this.sequences.ready;
      this.sequences.idle = this.sequences.ready;
      this.sequences.unknown = this.sequences.ready;

      this.loaded = true;
    } catch (e) {
      this.loaded = false;
    }
  },

  getAgentFrame(state, timeSeconds) {
    const gif = this.stateGifs[state] || this.stateGifs.ready || null;
    if (gif && gif.complete && gif.naturalWidth > 0) {
      return gif;
    }

    const frames = this.frames[state] || this.frames.ready || [];
    const seq = this.sequences[state] || this.sequences.ready;
    if (!frames.length || !seq) return null;

    const idx = Math.floor((timeSeconds * 1000 / seq.intervalMs) % seq.sequence.length);
    const frameIdx = seq.sequence[idx] || 0;
    const img = frames[frameIdx];
    return (img && img.complete && img.naturalWidth > 0) ? img : null;
  }
};

// ═══════════════════════════════════════════════════════
// WAYPOINTS & LOCATIONS (사이버펑크 오피스 배경 기준)
// ═══════════════════════════════════════════════════════

// 직각 이동을 위한 네비게이션 포인트
const NAV = {
  aisle_top: { x: 404, y: 236 },
  aisle_mid: { x: 404, y: 366 },
  aisle_bot: { x: 404, y: 496 },
  server_door: { x: 304, y: 366 },   // 서버실 문 앞
  server_stairs: { x: 164, y: 366 }, // 서버실 내부 계단 아래 (직각 이동용)
};

const LOCATIONS = {
  // Recalibrated against the current background's chair / floor anchors.
  claude_desk:  { x: 492, y: 236 },
  codex_desk:   { x: 492, y: 366 },
  gemini_desk:  { x: 492, y: 496 },
  sofa:         { x: 772, y: 220 },
  coffee:       { x: 804, y: 468 },
  server_room:  { x: 164, y: 274 },
  entrance:     { x: 868, y: 664 },
};

const IDLE_ROAM_SPOTS = [
  // Corridor / aisle zone (wider jitter so agents don't stack on nav-points)
  { anchor: NAV.aisle_top, jitterX: 36, jitterY: 24 },
  { anchor: NAV.aisle_mid, jitterX: 36, jitterY: 24 },
  { anchor: NAV.aisle_bot, jitterX: 36, jitterY: 24 },
  // Open floor between desks and lounge
  { anchor: { x: 580, y: 280 }, jitterX: 44, jitterY: 30 },
  { anchor: { x: 600, y: 420 }, jitterX: 50, jitterY: 36 },
  { anchor: { x: 560, y: 560 }, jitterX: 44, jitterY: 30 },
  // Lounge area — wide roam zone
  { anchor: { x: 720, y: 300 }, jitterX: 46, jitterY: 28 }, // sofa front floor
  { anchor: { x: 820, y: 340 }, jitterX: 38, jitterY: 28 }, // right lounge floor
  { anchor: { x: 760, y: 460 }, jitterX: 40, jitterY: 28 }, // near coffee lounge
  // Coffee machine vicinity
  { anchor: LOCATIONS.coffee, jitterX: 30, jitterY: 20 },
  // Server room corridor mouth
  { anchor: { x: 310, y: 366 }, jitterX: 30, jitterY: 24 },
  // Lower open floor toward entrance
  { anchor: { x: 680, y: 600 }, jitterX: 50, jitterY: 30 },
  { anchor: { x: 820, y: 580 }, jitterX: 40, jitterY: 28 },
];

// ═══════════════════════════════════════════════════════
// AGENT ENTITY — Pathfinding, Constant Speed, Sprite Flip, Speech
// ═══════════════════════════════════════════════════════
class Agent {
  constructor(name) {
    this.name   = name;
    this.role   = LANE_ROLES[name.toLowerCase()] || '';
    this.state  = 'off';
    this.note   = '';
    this.pid    = null;
    this.lastEventAt = '';

    // position & facing
    this.x = LOCATIONS.entrance.x;
    this.y = LOCATIONS.entrance.y;
    this.facingRight = true;

    // waypoint queue
    this._waypoints =[];
    this._atTarget  = true;

    // animation & speech
    this.bobPhase   = Math.random() * Math.PI * 2;
    this.blinkTimer = Math.random() * 3;
    this.isBlinking = false;
    this.movePhase  = 0;
    this.bubble     = { text: '', timer: 0 }; // 말풍선 데이터

    // idle behavior
    this._idleCooldown = 0;

    // fatigue system
    this.fatigue = 0;             // 0 ~ 100
    this._fatigueSweatTimer = 0;  // sweat particle cooldown
    this._coffeeTimer = 0;        // time spent at coffee machine
    this._atCoffee = false;       // currently drinking coffee

    // GIF overlay <img> element (for animated GIF rendering)
    this._gifEl = document.createElement('img');
    this._gifEl.style.cssText = 'position:absolute;pointer-events:none;image-rendering:pixelated;z-index:10;display:none;';
    this._gifState = ''; // track which state GIF is loaded
    document.querySelector('.canvas-wrap')?.appendChild(this._gifEl);
  }

  get color() { return STATE_COLORS[this.state] || STATE_COLORS.off; }

  /** Observable fatigue state for sidebar indicator */
  get fatigueState() {
    if (this._atCoffee) return 'coffee';
    if (this.state === 'working' && this.fatigue >= 15) return 'fatigued';
    return '';
  }

  /** 말풍선 띄우기 */
  speak(text, duration = 3.5) {
    if (!text) return;
    this.bubble = { text: truncate(text, 25), timer: duration };
  }

  /** Update state from API data and pick a target location */
  applyLaneData(lane) {
    const prevState = this.state;
    const prevNote = this.note;

    this.state = (lane.state || 'off').toLowerCase();
    this.note  = lane.note || lane.status_note || '';
    this.pid   = lane.pid || null;
    this.lastEventAt = lane.last_event_at || '';

    // 상태가 변했을 때
    if (prevState !== this.state) {
      this._pickTarget();
      if (prevState !== 'off') {
        spawnStateParticle(this.name, this.state);
        if (this.state === 'working') SoundFX.success();
        else if (this.state === 'broken' || this.state === 'dead') SoundFX.error();
        else SoundFX.blip();
      }
    }

    // 작업 내용(note)이 변경되었을 때 말풍선으로 브리핑
    if (this.note && prevNote !== this.note && this.state === 'working') {
      this.speak(this.note, 4.0);
    }
  }

  /** 상태에 따라 목적지를 정하고, 가구를 피하는 경로(배열)를 생성 */
  _pickIdleTarget() {
    // Fatigued? Coffee first!
    if (this.fatigue >= 15 && LOCATIONS.coffee) {
      this.speak('커피 마시러...☕', 2.5);
      const c = LOCATIONS.coffee;
      return { x: c.x + (Math.random() - 0.5) * 10, y: c.y + (Math.random() - 0.5) * 10 };
    }
    if (!IDLE_ROAM_SPOTS.length) return LOCATIONS.entrance;
    const pool = IDLE_ROAM_SPOTS.map((spot, index) => ({ spot, index }));
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    for (const { spot } of pool) {
      const ax = spot.anchor.x;
      const ay = spot.anchor.y;
      const dx = ax - this.x;
      const dy = ay - this.y;
      if (Math.hypot(dx, dy) < 60) continue;
      return {
        x: ax + (Math.random() - 0.5) * (spot.jitterX || 0),
        y: ay + (Math.random() - 0.5) * (spot.jitterY || 0),
      };
    }
    const fallback = pool[0].spot;
    return {
      x: fallback.anchor.x + (Math.random() - 0.5) * (fallback.jitterX || 0),
      y: fallback.anchor.y + (Math.random() - 0.5) * (fallback.jitterY || 0),
    };
  }

  _pickTarget() {
    this._waypoints =[];
    const deskKey = `${this.name.toLowerCase()}_desk`;
    const desk = LOCATIONS[deskKey];
    let dest;

    // 1. 최종 목적지 결정
    switch (this.state) {
      case 'working':
      case 'booting':
        dest = desk || LOCATIONS.entrance;
        break;
      case 'ready':
      case 'idle':
        dest = this._pickIdleTarget();
        break;
      case 'broken':
      case 'dead':
        dest = desk ? { x: desk.x + 20, y: desk.y + 10 } : LOCATIONS.entrance;
        break;
      default:
        dest = { x: LOCATIONS.entrance.x, y: LOCATIONS.entrance.y };
    }

    // 2. 경로 생성 (방 탈출 -> 복도 -> 목적지 방 진입)

    // 현재 위치에서 빠져나오기
    if (this.x < 250) { // 서버실 내부에 있음
      this._waypoints.push(NAV.server_stairs);
      this._waypoints.push(NAV.server_door);
      this._waypoints.push(NAV.aisle_mid);
    } else if (this.x > 350 && this.x < 550) { // 책상 구역에 있음
      if (this.y < 400) this._waypoints.push(NAV.aisle_top);
      else if (this.y < 550) this._waypoints.push(NAV.aisle_mid);
      else this._waypoints.push(NAV.aisle_bot);
    } else if (this.x > 750) { // 우측 휴게 구역에 있음
      if (this.y < 450) this._waypoints.push(NAV.aisle_top);
      else this._waypoints.push(NAV.aisle_bot);
    }

    // 목적지로 들어가기
    if (dest.x < 250) { // 목적지가 서버실
      this._waypoints.push(NAV.aisle_mid);
      this._waypoints.push(NAV.server_door);
      this._waypoints.push(NAV.server_stairs);
    } else if (dest.x > 350 && dest.x < 550) { // 목적지가 책상
      if (dest.y < 400) this._waypoints.push(NAV.aisle_top);
      else if (dest.y < 550) this._waypoints.push(NAV.aisle_mid);
      else this._waypoints.push(NAV.aisle_bot);
    } else if (dest.x > 750) { // 목적지가 우측 휴게 구역
      if (dest.y < 450) this._waypoints.push(NAV.aisle_top);
      else this._waypoints.push(NAV.aisle_bot);
    }

    // 최종 목적지 추가
    this._waypoints.push(dest);
    this._atTarget = false;
  }

  update(dt) {
    // ── Fatigue system ──
    const FATIGUE_THRESHOLD = 15; // seconds of work before tired
    const fatigued = this.fatigue >= FATIGUE_THRESHOLD;

    if (this.state === 'working') {
      this.fatigue += dt; // 1 per second while working
      this._atCoffee = false;
    }

    // Sweat particles when tired and working
    if (fatigued && this.state === 'working') {
      this._fatigueSweatTimer -= dt;
      if (this._fatigueSweatTimer <= 0) {
        this._fatigueSweatTimer = 1.2 + Math.random() * 0.8;
        spawnParticle(this.name, '💦', { size: 12, lifetime: 1.0 });
      }
    }

    // Coffee stop: wait 2 seconds, then reset fatigue
    if (this._atCoffee) {
      this._coffeeTimer += dt;
      if (this._coffeeTimer >= 2.0) {
        this.fatigue = 0;
        this._atCoffee = false;
        this._coffeeTimer = 0;
        spawnParticle(this.name, '☕', { size: 16, lifetime: 1.5 });
        this.speak('커피 충전 완료!', 2.0);
      }
    }

    // ── Walk along waypoints ──
    const speedMult = fatigued ? 0.6 : 1.0;
    if (this._waypoints.length > 0) {
      const wp = this._waypoints[0];
      const dx = wp.x - this.x;
      const dy = wp.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (Math.abs(dx) > 2) this.facingRight = dx > 0;

      const step = WALK_SPEED * speedMult * dt;

      if (dist <= step) {
        this.x = wp.x;
        this.y = wp.y;
        this._waypoints.shift();
        if (this._waypoints.length === 0) {
          this._atTarget = true;
          // Check if arrived at coffee machine
          const coffeeLoc = LOCATIONS.coffee;
          if (coffeeLoc && Math.abs(this.x - coffeeLoc.x) < 40 && Math.abs(this.y - coffeeLoc.y) < 40) {
            this._atCoffee = true;
            this._coffeeTimer = 0;
          }
        }
      } else {
        this.x += (dx / dist) * step;
        this.y += (dy / dist) * step;
      }

      this.movePhase += dt * 8;
      this._atTarget = false;
    } else {
      this._atTarget = true;
      if (this.movePhase > 0) this.movePhase = Math.max(0, this.movePhase - dt * 12);
    }

    // ── Animations & Timers ──
    this.bobPhase += dt * (this.state === 'working' ? 4 : 1.8);
    this.blinkTimer -= dt;
    if (this.blinkTimer <= 0) {
      this.isBlinking = !this.isBlinking;
      this.blinkTimer = this.isBlinking ? 0.12 : 2 + Math.random() * 3;
    }

    if (this.bubble.timer > 0) {
      this.bubble.timer -= dt;
    }

    // ── Idle wandering ──
    if (this._atTarget && !this._atCoffee && (this.state === 'ready' || this.state === 'idle')) {
      this._idleCooldown -= dt;
      if (this._idleCooldown <= 0) {
        this._idleCooldown = 4 + Math.random() * 8;
        this._pickTarget();
      }
    }
  }

  draw(ctx, scale) {
    const sx = this.x * scale;
    const sy = this.y * scale;
    const bob = Math.sin(this.bobPhase) * (this.state === 'working' ? 1.5 : 2.5) * scale;
    const walk = this._atTarget ? 0 : Math.sin(this.movePhase) * 2 * scale;

    // Check if a GIF asset exists for this state
    const gifSrc = STATE_GIF_ASSETS[this.state] || STATE_GIF_ASSETS.ready || '';
    const hasGif = Boolean(gifSrc);
    let headY = sy;

    if (hasGif) {
      // ═══ ANIMATED GIF MODE (via <img> overlay) ═══
      // Update GIF src if state changed
      if (this._gifState !== this.state) {
        this._gifEl.src = gifSrc;
        this._gifState = this.state;
      }
      this._gifEl.style.display = 'block';

      const spriteH = 90 * scale;
      const spriteW = spriteH * (this._gifEl.naturalWidth && this._gifEl.naturalHeight
        ? this._gifEl.naturalWidth / this._gifEl.naturalHeight : 1);
      headY = sy - spriteH + 12 * scale + bob + walk;

      // Position the <img> overlay on top of canvas
      this._gifEl.style.width  = spriteW + 'px';
      this._gifEl.style.height = spriteH + 'px';
      this._gifEl.style.left   = (sx - spriteW / 2) + 'px';
      this._gifEl.style.top    = headY + 'px';
      this._gifEl.style.transform = this.facingRight ? 'scaleX(1)' : 'scaleX(-1)';

      // Grayscale filter for broken/dead
      if (this.state === 'broken' || this.state === 'dead' || this.state === 'off') {
        this._gifEl.style.filter = 'grayscale(0.9) brightness(0.7)';
      } else {
        this._gifEl.style.filter = '';
      }

      // Shadow on canvas
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.ellipse(sx, sy + 6 * scale, spriteW * 0.35, 5 * scale, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Hide GIF overlay when no GIF
      this._gifEl.style.display = 'none';
      // ═══ CIRCLE FALLBACK ═══
      const r = 13 * scale;
      const bodyY = sy + bob + walk;
      headY = bodyY - r;

      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(sx, sy + r + 3 * scale, r * 0.7, r * 0.22, 0, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = this.color;
      ctx.beginPath(); ctx.arc(sx, bodyY, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.beginPath(); ctx.arc(sx - r * 0.25, bodyY - r * 0.3, r * 0.55, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.2 * scale;
      ctx.beginPath(); ctx.arc(sx, bodyY, r, 0, Math.PI * 2); ctx.stroke();

      if (!this.isBlinking) {
        const eyeY = bodyY - 2 * scale, eyeOx = 4.5 * scale, eyeR = 2.2 * scale, pupR = 1.2 * scale;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(sx - eyeOx, eyeY, eyeR, 0, Math.PI * 2); ctx.arc(sx + eyeOx, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
        const lookX = (this.facingRight ? 1 : -1) * 0.8 * scale;
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath(); ctx.arc(sx - eyeOx + lookX, eyeY, pupR, 0, Math.PI * 2); ctx.arc(sx + eyeOx + lookX, eyeY, pupR, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.4 * scale;
        const eyeY = bodyY - 2 * scale;
        ctx.beginPath(); ctx.moveTo(sx - 6 * scale, eyeY); ctx.lineTo(sx - 3 * scale, eyeY);
        ctx.moveTo(sx + 3 * scale, eyeY); ctx.lineTo(sx + 6 * scale, eyeY); ctx.stroke();
      }

      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1 * scale;
      if (this.state === 'working') {
        ctx.beginPath(); ctx.moveTo(sx - 3 * scale, bodyY + 4 * scale); ctx.lineTo(sx + 3 * scale, bodyY + 4 * scale); ctx.stroke();
      } else if (this.state === 'broken' || this.state === 'dead') {
        ctx.beginPath(); ctx.arc(sx, bodyY + 7 * scale, 3 * scale, Math.PI, 0); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.arc(sx, bodyY + 3 * scale, 3 * scale, 0, Math.PI); ctx.stroke();
      }
    }

    // ═══ LABELS ═══
    const r = 13 * scale;
    ctx.font = `bold ${9.5 * scale}px 'Noto Sans KR', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText(this.name, sx + 1, sy - (hasGif ? 72 * scale : r + 5 * scale) + 1);
    ctx.fillStyle = '#e8ecf4';
    ctx.fillText(this.name, sx, sy - (hasGif ? 72 * scale : r + 5 * scale));

    const stateText = this.state.toUpperCase();
    ctx.font = `bold ${7 * scale}px sans-serif`;
    const tw = ctx.measureText(stateText).width;
    const pillW = tw + 8 * scale, pillH = 12 * scale;
    const pillX = sx - pillW / 2;
    const pillY = sy + (hasGif ? 10 : r + 8) * scale;
    ctx.fillStyle = this.color + '33';
    ctx.beginPath(); ctx.roundRect(pillX, pillY, pillW, pillH, 3 * scale); ctx.fill();
    ctx.fillStyle = this.color; ctx.textBaseline = 'middle';
    ctx.fillText(stateText, sx, pillY + pillH / 2);

    // ═══ SPEECH BUBBLE (말풍선) ═══
    if (this.bubble.timer > 0) {
      ctx.save();
      const padX = 10 * scale, padY = 6 * scale;
      ctx.font = `bold ${10 * scale}px 'Noto Sans KR', sans-serif`;
      const textW = ctx.measureText(this.bubble.text).width;
      const boxW = textW + padX * 2;
      const boxH = 16 * scale + padY * 2;

      // 말풍선 위치 (캐릭터 머리 위)
      const bx = sx;
      const by = headY - 15 * scale;

      // 꼬리 그리기
      ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
      ctx.beginPath();
      ctx.moveTo(bx - 5 * scale, by - boxH + 2 * scale);
      ctx.lineTo(bx + 5 * scale, by - boxH + 2 * scale);
      ctx.lineTo(bx, by + 4 * scale);
      ctx.fill();

      // 박스 그리기
      ctx.beginPath();
      ctx.roundRect(bx - boxW / 2, by - boxH, boxW, boxH, 8 * scale);
      ctx.fill();

      // 텍스트 그리기
      ctx.fillStyle = '#0f172a';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.bubble.text, bx, by - boxH / 2 + 1 * scale);
      ctx.restore();
    }
  }

  hitTest(vx, vy) {
    const dx = vx - this.x; const dy = vy - this.y;
    return Math.sqrt(dx * dx + dy * dy) < 20;
  }
}

// ═══════════════════════════════════════════════════════
// PARTICLE
// ═══════════════════════════════════════════════════════
const STATE_PARTICLES = { working: '💡', ready: '💤', booting: '⚡', broken: '💦', dead: '💀', off: '🌙' };
const EVENT_PARTICLES = { ok: '✅', warn: '❗', err: '🔥', info: '💬' };

class Particle {
  constructor(vx, vy, text, opts = {}) {
    this.vx = vx + (Math.random() - 0.5) * 14;
    this.vy = vy - 30;
    this.text = text;
    this.color   = opts.color    || '#e2e8f0';
    this.lifetime = opts.lifetime || 1.6;
    this.maxLife  = this.lifetime;
    this.size     = opts.size     || 16;
    this.driftX   = (Math.random() - 0.5) * 12;
    this.driftY   = -(25 + Math.random() * 15);
    this.alive = true;
  }
  update(dt) {
    this.vx += this.driftX * dt; this.vy += this.driftY * dt;
    this.lifetime -= dt; if (this.lifetime <= 0) this.alive = false;
  }
  draw(ctx, scale) {
    const alpha = Math.max(0, this.lifetime / this.maxLife);
    const sx = this.vx * scale, sy = this.vy * scale, sz = this.size * scale;
    ctx.save(); ctx.globalAlpha = alpha; ctx.font = `${sz}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const lifeFrac = 1 - (this.lifetime / this.maxLife);
    const pop = lifeFrac < 0.15 ? 1 + (0.15 - lifeFrac) * 3 : 1;
    ctx.translate(sx, sy); ctx.scale(pop, pop);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillText(this.text, 1, 1);
    ctx.fillStyle = this.color; ctx.fillText(this.text, 0, 0);
    ctx.restore();
  }
}

function spawnParticle(agentName, text, opts) {
  if (_lowMotion) return;
  const agent = agents.get(agentName);
  if (!agent) return;
  particles.push(new Particle(agent.x, agent.y, text, opts));
}
function spawnStateParticle(agentName, newState) {
  spawnParticle(agentName, STATE_PARTICLES[newState] || '❓', { size: 20, lifetime: 1.8 });
}
function spawnEventParticle(agentName, eventType) {
  spawnParticle(agentName, EVENT_PARTICLES[eventType] || '💬', { size: 14, lifetime: 1.3 });
}

// ═══════════════════════════════════════════════════════
// OFFICE RENDERER
// ═══════════════════════════════════════════════════════
const BACKGROUND_ASSET_CANDIDATES = [
  '/controller-assets/background.png',
  '/controller-assets/generated/bg-office.png',
];
const _bgImg = new Image();
let _bgReady = false;
let _bgSource = '';
let _bgLoadError = '';
let _bgSignalKey = '';
let _eventLogReady = false;
const _pendingBackgroundSignals = [];

function _emitBackgroundSignal(type, key, msg) {
  if (_bgSignalKey === key) return;
  _bgSignalKey = key;
  if (!_eventLogReady) {
    _pendingBackgroundSignals.push({ type, msg });
    return;
  }
  pushEvent(type, msg);
}

function _flushBackgroundSignals() {
  if (!_eventLogReady) return;
  while (_pendingBackgroundSignals.length) {
    const entry = _pendingBackgroundSignals.shift();
    pushEvent(entry.type, entry.msg);
  }
}

function _loadBackgroundAsset(index = 0) {
  const src = BACKGROUND_ASSET_CANDIDATES[index];
  if (!src) {
    _bgReady = false;
    _bgSource = '';
    _bgLoadError = 'background_unavailable';
    _emitBackgroundSignal('err', 'background:error:none', 'Scene background load failed');
    return;
  }

  _bgImg.onload = () => {
    if (_bgSource === src && _bgReady) return;
    _bgReady = true;
    _bgSource = src;
    _bgLoadError = '';
    if (index > 0) {
      _emitBackgroundSignal('warn', `background:fallback:${src}`, `Scene background fallback → ${basename(src)}`);
    }
  };
  _bgImg.onerror = () => {
    if (index + 1 < BACKGROUND_ASSET_CANDIDATES.length) {
      _loadBackgroundAsset(index + 1);
      return;
    }
    _bgReady = false;
    _bgSource = '';
    _bgLoadError = basename(src);
    _emitBackgroundSignal('err', `background:error:${src}`, `Scene background load failed → ${basename(src)}`);
  };
  _bgImg.src = src;

  if (_bgImg.complete) {
    if (_bgImg.naturalWidth > 0) {
      _bgImg.onload();
    } else if (index + 1 < BACKGROUND_ASSET_CANDIDATES.length) {
      _loadBackgroundAsset(index + 1);
    } else {
      _bgImg.onerror();
    }
  }
}

_loadBackgroundAsset();

const OfficeRenderer = {
  drawRoom(ctx, cw, ch, scale) {
    if (_bgReady) {
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(_bgImg, 0, 0, VIRTUAL_W * scale, VIRTUAL_H * scale);
    } else {
      ctx.fillStyle = '#0a0f1a';
      ctx.fillRect(0, 0, cw, ch);
    }
  }
};

// ═══════════════════════════════════════════════════════
// MONITOR MATRIX EFFECT + HOLOGRAM
// ═══════════════════════════════════════════════════════

/** Monitor screen areas (virtual coords, mapped to desks) */
const MONITOR_SCREENS = {
  claude: { x: 440, y: 190, w: 56, h: 34 },
  codex:  { x: 440, y: 320, w: 56, h: 34 },
  gemini: { x: 440, y: 450, w: 56, h: 34 },
};

/** Matrix rain columns per monitor */
const _matrixState = {};
const MATRIX_CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>/{}[];=+-*';

function _initMatrix(key, cols) {
  _matrixState[key] = {
    columns: Array.from({ length: cols }, () => ({
      y: Math.random() * -20,
      speed: 1.5 + Math.random() * 3,
      chars: Array.from({ length: 8 }, () =>
        MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)]
      ),
    })),
  };
}

const MonitorFX = {
  /** Draw matrix code rain inside a monitor screen area */
  drawMatrix(ctx, scale, key, dt) {
    const scr = MONITOR_SCREENS[key];
    if (!scr) return;
    if (!_matrixState[key]) _initMatrix(key, 7);
    const state = _matrixState[key];

    const sx = scr.x * scale, sy = scr.y * scale;
    const sw = scr.w * scale, sh = scr.h * scale;

    ctx.save();

    // Clip to monitor screen
    ctx.beginPath();
    ctx.rect(sx, sy, sw, sh);
    ctx.clip();

    // Dark screen background
    ctx.fillStyle = 'rgba(0,8,4,0.85)';
    ctx.fillRect(sx, sy, sw, sh);

    // Matrix columns
    const fontSize = 5 * scale;
    ctx.font = `${fontSize}px monospace`;
    ctx.textAlign = 'center';

    const colW = sw / state.columns.length;
    for (let c = 0; c < state.columns.length; c++) {
      const col = state.columns[c];
      col.y += col.speed * dt * 12;

      for (let i = 0; i < col.chars.length; i++) {
        const cy = sy + (col.y + i) * fontSize;
        if (cy < sy - fontSize || cy > sy + sh + fontSize) continue;

        const brightness = i === col.chars.length - 1 ? 1.0 : 0.3 + (i / col.chars.length) * 0.4;
        const green = Math.floor(80 + brightness * 175);
        ctx.fillStyle = i === col.chars.length - 1
          ? `rgba(180,255,180,${brightness})`
          : `rgba(0,${green},0,${brightness * 0.7})`;
        ctx.fillText(col.chars[i], sx + c * colW + colW / 2, cy);
      }

      // Reset column when it scrolls past screen
      if ((col.y) * fontSize > sh + fontSize * col.chars.length) {
        col.y = -col.chars.length;
        col.speed = 1.5 + Math.random() * 3;
        // Randomize a few chars
        for (let i = 0; i < col.chars.length; i++) {
          if (Math.random() < 0.5) {
            col.chars[i] = MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)];
          }
        }
      }
    }

    // Scanline overlay
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    for (let ly = sy; ly < sy + sh; ly += 2 * scale) {
      ctx.fillRect(sx, ly, sw, 1);
    }

    // Screen edge glow
    const edgeGrad = ctx.createLinearGradient(sx, sy, sx, sy + sh);
    edgeGrad.addColorStop(0, 'rgba(0,255,80,0.08)');
    edgeGrad.addColorStop(1, 'rgba(0,255,80,0)');
    ctx.fillStyle = edgeGrad;
    ctx.fillRect(sx, sy, sw, sh);

    ctx.restore();
  },

  /** Draw hologram above working desk */
  drawHologram(ctx, scale, key, text, time) {
    const scr = MONITOR_SCREENS[key];
    if (!scr) return;

    const cx = (scr.x + scr.w / 2) * scale;
    const baseY = (scr.y - 8) * scale;
    const bob = Math.sin(time * 2) * 3 * scale;
    const hy = baseY - 22 * scale + bob;

    ctx.save();

    // Hologram beam (narrow triangle from monitor to text)
    const beamGrad = ctx.createLinearGradient(cx, baseY, cx, hy);
    beamGrad.addColorStop(0, 'rgba(96,165,250,0.12)');
    beamGrad.addColorStop(1, 'rgba(96,165,250,0.02)');
    ctx.fillStyle = beamGrad;
    ctx.beginPath();
    ctx.moveTo(cx - 12 * scale, baseY);
    ctx.lineTo(cx + 12 * scale, baseY);
    ctx.lineTo(cx + 30 * scale, hy + 8 * scale);
    ctx.lineTo(cx - 30 * scale, hy + 8 * scale);
    ctx.closePath();
    ctx.fill();

    // Glowing text
    const displayText = text.length > 18 ? '…' + text.slice(-17) : text;
    ctx.font = `bold ${6 * scale}px 'Cascadia Code', 'Fira Code', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Outer glow
    ctx.fillStyle = `rgba(96,165,250,${0.15 + Math.sin(time * 3) * 0.05})`;
    const tw = ctx.measureText(displayText).width;
    ctx.beginPath();
    ctx.roundRect(cx - tw / 2 - 6 * scale, hy - 6 * scale, tw + 12 * scale, 12 * scale, 3 * scale);
    ctx.fill();

    // Text with flicker
    const flicker = 0.7 + Math.sin(time * 8) * 0.15;
    ctx.fillStyle = `rgba(147,197,253,${flicker})`;
    ctx.fillText(displayText, cx, hy);

    // Horizontal scan line
    const scanY = hy - 5 * scale + ((time * 20 * scale) % (12 * scale));
    ctx.fillStyle = 'rgba(96,165,250,0.1)';
    ctx.fillRect(cx - tw / 2 - 4 * scale, scanY, tw + 8 * scale, 1);

    ctx.restore();
  },
};

// IDEA 1 — DATA DELIVERY VISUALIZATION
// A short-lived particle that travels from one desk to another
// when active_control_seq or lane handoff changes.
// ═══════════════════════════════════════════════════════
const deliveryPackets = [];

function speakAgent(name, text, duration = 2.8) {
  if (!text) return;
  const agent = agents.get(name);
  if (!agent) return;
  agent.speak(text, duration);
}

function playDeliverySound(kind = 'blip') {
  if (kind === 'success') SoundFX.success();
  else if (kind === 'warn') SoundFX.warn();
  else SoundFX.blip();
}

class DeliveryPacket {
  constructor(fromName, toName, label, opts = {}) {
    const fromAgent = agents.get(fromName);
    const toAgent = agents.get(toName);
    const src = fromAgent
      ? { x: fromAgent.x, y: fromAgent.y - 28 }
      : (LOCATIONS[`${fromName.toLowerCase()}_desk`] || LOCATIONS.entrance);
    const dst = toAgent
      ? { x: toAgent.x, y: toAgent.y - 28 }
      : (LOCATIONS[`${toName.toLowerCase()}_desk`] || LOCATIONS.entrance);
    this.fromName = fromName;
    this.toName = toName;
    this.x = src.x; this.y = src.y;
    this.tx = dst.x; this.ty = dst.y;
    this.label = label || '📦';
    this.receiverText = opts.receiverText || '';
    this.receiverDuration = opts.receiverDuration || 2.6;
    this.deliverySound = opts.deliverySound || 'blip';
    this.lifetime = opts.lifetime || 2.0;
    this.maxLife = this.lifetime;
    this.delivered = false;
    this.alive = true;
  }
  update(dt) {
    const frac = 1 - (this.lifetime / this.maxLife);
    this.x += (this.tx - this.x) * 0.04;
    this.y += (this.ty - this.y) * 0.04;
    // Arc: rise then fall
    this.arcY = -Math.sin(frac * Math.PI) * 40;
    const remaining = Math.hypot(this.tx - this.x, this.ty - this.y);
    if (!this.delivered && remaining < 18) {
      this.delivered = true;
      speakAgent(this.toName, this.receiverText, this.receiverDuration);
      playDeliverySound(this.deliverySound);
    }
    this.lifetime -= dt;
    if (this.lifetime <= 0) this.alive = false;
  }
  draw(ctx, scale) {
    const alpha = Math.min(1, this.lifetime / (this.maxLife * 0.3));
    const sx = this.x * scale;
    const sy = (this.y + this.arcY) * scale;
    ctx.save();
    ctx.globalAlpha = alpha;
    // Glow trail
    ctx.fillStyle = 'rgba(96,165,250,0.15)';
    ctx.beginPath();
    ctx.arc(sx, sy, 14 * scale, 0, Math.PI * 2);
    ctx.fill();
    // Emoji
    ctx.font = `${14 * scale}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(this.label, sx, sy);
    ctx.restore();
  }
}

const _deliveryState = {
  initialized: false,
  controlSeq: null,
  latestWorkPath: '',
  latestWorkMtime: '',
  latestVerifyPath: '',
  latestVerifyMtime: '',
  lastReceiptId: '',
};

function emitDelivery(fromName, toName, label, opts = {}) {
  if (opts.senderText) speakAgent(fromName, opts.senderText, opts.senderDuration || 2.4);
  deliveryPackets.push(new DeliveryPacket(fromName, toName, label, {
    receiverText: opts.receiverText || '',
    receiverDuration: opts.receiverDuration,
    deliverySound: opts.sound || 'blip',
    lifetime: opts.lifetime,
  }));
  if (opts.eventMsg) pushEvent(opts.eventType || 'info', opts.eventMsg);
}

// ═══════════════════════════════════════════════════════
// DELIVERY DRONE — flies in from off-screen with a package
// ═══════════════════════════════════════════════════════
const drones = [];

class Drone {
  /**
   * @param {string} targetLane - agent name to deliver to
   */
  constructor(targetLane) {
    const deskKey = `${targetLane.toLowerCase()}_desk`;
    const desk = LOCATIONS[deskKey] || LOCATIONS.entrance;
    this.targetName = targetLane;

    // Spawn from above (off-screen) or from window area
    this.x = desk.x + (Math.random() - 0.5) * 200;
    this.y = -50;
    this.tx = desk.x;
    this.ty = desk.y - 30; // hover above desk

    this.phase = 'arriving';  // arriving → hovering → departing → done
    this.hoverTimer = 0;
    this.alive = true;
    this.propPhase = Math.random() * Math.PI * 2;

    // Exit target (fly back off-screen)
    this.exitX = desk.x + (Math.random() < 0.5 ? -300 : 300);
    this.exitY = -80;
  }

  update(dt) {
    this.propPhase += dt * 20;

    switch (this.phase) {
      case 'arriving': {
        // Smooth approach (lerp toward desk)
        this.x += (this.tx - this.x) * 2.5 * dt;
        this.y += (this.ty - this.y) * 2.5 * dt;
        const dist = Math.sqrt((this.tx - this.x) ** 2 + (this.ty - this.y) ** 2);
        if (dist < 5) {
          this.x = this.tx; this.y = this.ty;
          this.phase = 'hovering';
          this.hoverTimer = 0;
        }
        break;
      }
      case 'hovering': {
        // Hover + drop package
        this.y += Math.sin(this.propPhase * 0.3) * 0.3;
        this.hoverTimer += dt;
        if (this.hoverTimer >= 0.6) {
          // Drop the package
          spawnParticle(this.targetName, '📦', { size: 18, lifetime: 1.5 });
          SoundFX.blip();
          this.phase = 'departing';
        }
        break;
      }
      case 'departing': {
        // Fly away
        this.x += (this.exitX - this.x) * 3.0 * dt;
        this.y += (this.exitY - this.y) * 3.0 * dt;
        if (this.y < -60) {
          this.alive = false;
        }
        break;
      }
    }
  }

  draw(ctx, scale) {
    const sx = this.x * scale;
    const sy = this.y * scale;
    const sz = 6 * scale;

    ctx.save();

    // Propeller blur circle
    const propAlpha = 0.2 + Math.sin(this.propPhase) * 0.1;
    ctx.fillStyle = `rgba(150,200,255,${propAlpha})`;
    ctx.beginPath();
    ctx.ellipse(sx, sy - sz * 1.5, sz * 2.2, sz * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body (small dark quad)
    ctx.fillStyle = '#2a3548';
    ctx.beginPath();
    ctx.roundRect(sx - sz, sy - sz, sz * 2, sz * 1.5, 2 * scale);
    ctx.fill();

    // LED lights
    ctx.fillStyle = this.phase === 'hovering' ? '#34d399' : '#60a5fa';
    ctx.beginPath();
    ctx.arc(sx - sz * 0.5, sy - sz * 0.3, 1.5 * scale, 0, Math.PI * 2);
    ctx.arc(sx + sz * 0.5, sy - sz * 0.3, 1.5 * scale, 0, Math.PI * 2);
    ctx.fill();

    // Arms
    ctx.strokeStyle = '#4a5c72';
    ctx.lineWidth = 1.5 * scale;
    ctx.beginPath();
    ctx.moveTo(sx - sz * 1.8, sy - sz * 1.2);
    ctx.lineTo(sx - sz * 0.3, sy - sz * 0.5);
    ctx.moveTo(sx + sz * 1.8, sy - sz * 1.2);
    ctx.lineTo(sx + sz * 0.3, sy - sz * 0.5);
    ctx.stroke();

    // Propeller discs
    const propW = sz * 1.2;
    ctx.fillStyle = `rgba(200,220,255,${0.3 + Math.sin(this.propPhase * 2) * 0.15})`;
    ctx.beginPath();
    ctx.ellipse(sx - sz * 1.8, sy - sz * 1.5, propW, sz * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(sx + sz * 1.8, sy - sz * 1.5, propW, sz * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();

    // Package dangling (while arriving/hovering)
    if (this.phase !== 'departing') {
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(sx - 3 * scale, sy + sz * 0.5, 6 * scale, 5 * scale);
      ctx.strokeStyle = '#5a4510';
      ctx.lineWidth = 0.5 * scale;
      ctx.strokeRect(sx - 3 * scale, sy + sz * 0.5, 6 * scale, 5 * scale);
      // String
      ctx.strokeStyle = '#777';
      ctx.lineWidth = 0.5 * scale;
      ctx.beginPath();
      ctx.moveTo(sx, sy + sz * 0.1);
      ctx.lineTo(sx, sy + sz * 0.5);
      ctx.stroke();
    }

    // Shadow on ground
    if (this.phase === 'hovering') {
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(sx, (this.ty + 35) * scale, 10 * scale, 3 * scale, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

/** Spawn a delivery drone to a specific agent desk */
function spawnDrone(targetLane) {
  if (_lowMotion) return;
  drones.push(new Drone(targetLane));
